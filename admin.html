<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Mawar Sari Bakery</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1, h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 8px; font-weight: 600; color: #34495e; }
        .form-group input, .form-group textarea, .form-group select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        .btn-submit { background-color: #2ecc71; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-submit:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .menu-list { margin-top: 40px; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; }
        .menu-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
        .menu-details { flex-grow: 1; margin-left: 15px; }
        .menu-details h4 { margin: 0 0 5px 0; color: #2c3e50; }
        .menu-details p { margin: 0; size: 13px; color: #64748b; }
        .actions button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .btn-edit { background-color: #3498db; color: white; }
        .btn-delete { background-color: #e74c3c; color: white; }
        .logout-box { text-align: right; margin-bottom: 20px; }
        .btn-logout { background-color: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .status-upload { font-size: 13px; color: #e67e22; margin-top: 5px; font-weight: bold; }
    </style>

    <!-- SDK FIREBASE LENGKAP DENGAN STORAGE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>

<div class="admin-container">
    <div class="logout-box">
        <button class="btn-logout" onclick="logoutAdmin()">🚪 Keluar Panel Admin</button>
    </div>
    
    <h1>Kelola Katalog Kue Mawar Sari</h1>
    
    <!-- Form Tambah / Edit -->
    <form id="menuForm">
        <input type="hidden" id="menuId">
        <input type="hidden" id="oldImageUrl">
        
        <div class="form-grid">
            <div class="form-group">
                <label for="menuName">Nama Roti/Kue:</label>
                <input type="text" id="menuName" required placeholder="Contoh: Black Forest Premium">
            </div>
            <div class="form-group">
                <label for="menuPrice">Harga Pokok (Rp):</label>
                <input type="number" id="menuPrice" required placeholder="Contoh: 150000">
            </div>
            <div class="form-group">
                <label for="menuKategori">Kategori Display:</label>
                <select id="menuKategori">
                    <option value="kue_biasa">Katalog Kue Biasa</option>
                    <option value="best_seller">Sliding Best Seller (Halaman Depan)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="menuImage">Foto Kue:</label>
                <input type="file" id="menuImage" accept="image/*">
                <div id="uploadStatus" class="status-upload"></div>
            </div>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="menuDesc">Deskripsi Roti/Kue:</label>
            <textarea id="menuDesc" rows="3" placeholder="Jelaskan kelembutan kue, varian rasa, atau ukuran..."></textarea>
        </div>
        
        <button type="submit" id="btnSubmitForm" class="btn-submit">Simpan & Publikasikan Kue</button>
    </form>

    <!-- List Monitor Data Real-time -->
    <div class="menu-list">
        <h2>Daftar Kue Aktif Saat Ini</h2>
        <div id="containerDaftarKue">
            <p style="color: #888;">Memuat data kue...</p>
        </div>
    </div>
</div>

<script>
    // Proteksi Halaman Login
    if (sessionStorage.getItem('status_login') !== 'sukses_masuk') {
        window.location.href = 'login.html';
    }

    function logoutAdmin() {
        sessionStorage.removeItem('status_login');
        window.location.href = 'login.html';
    }

    // KONFIGURASI FIREBASE RESMI
    const firebaseConfig = {
        apiKey: "AIzaSyBV6z7KT4OM8QiopYoFbRUGI6248HEkE8w",
        authDomain: "mawar-sari-bakery.firebaseapp.com",
        databaseURL: "https://mawar-sari-bakery-default-rtdb.firebaseio.com",
        projectId: "mawar-sari-bakery",
        storageBucket: "mawar-sari-bakery.appspot.com", // Diperbaiki agar menunjuk ke storage default
        messagingSenderId: "100804150468",
        appId: "1:100804150468:web:fdb97e55881183f69d7591"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storage = firebase.storage();

    const menuForm = document.getElementById('menuForm');
    const containerDaftarKue = document.getElementById('containerDaftarKue');
    const uploadStatus = document.getElementById('uploadStatus');
    const btnSubmitForm = document.getElementById('btnSubmitForm');

    // MENGIRIM / MEMPERBARUI DATA KUE DENGAN CLOUD STORAGE
    menuForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const id = document.getElementById('menuId').value;
        const name = document.getElementById('menuName').value;
        const price = document.getElementById('menuPrice').value;
        const kategori = document.getElementById('menuKategori').value;
        const desc = document.getElementById('menuDesc').value;
        const imageFile = document.getElementById('menuImage').files[0];
        const oldImageUrl = document.getElementById('oldImageUrl').value;

        btnSubmitForm.disabled = true;
        btnSubmitForm.innerText = "Sedang memproses data...";

        // Logika: Jika admin mengunggah file gambar baru
        if (imageFile) {
            uploadStatus.innerText = "⏳ Sedang mengunggah gambar ke cloud...";
            const storageRef = storage.ref('produk_kue/' + Date.now() + '_' + imageFile.name);
            
            storageRef.put(imageFile).then(function(snapshot) {
                return snapshot.ref.getDownloadURL();
            }).then(function(downloadURL) {
                eksekusiSimpanDatabase(id, name, price, kategori, desc, downloadURL);
            }).catch(function(error) {
                alert("Gagal upload gambar: " + error.message);
                resetTombolForm();
            });
        } else {
            // Jika tidak ganti gambar, pakai gambar yang lama atau default
            const finalImageUrl = oldImageUrl || 'toko.jpeg';
            eksekusiSimpanDatabase(id, name, price, kategori, desc, finalImageUrl);
        }
    });

    function eksekusiSimpanDatabase(id, name, price, kategori, desc, imageUrl) {
        const targetRef = id ? database.ref('katalog_menu/' + id) : database.ref('katalog_menu').push();
        
        targetRef.set({
            name: name,
            price: parseInt(price),
            kategori: kategori,
            desc: desc,
            image: imageUrl
        }, function(error) {
            if (error) {
                alert("Gagal sinkronisasi data!");
            } else {
                alert(id ? "Kue berhasil diperbarui secara global!" : "Kue baru sukses ditambahkan secara live!");
                menuForm.reset();
                document.getElementById('menuId').value = "";
                document.getElementById('oldImageUrl').value = "";
                uploadStatus.innerText = "";
            }
            resetTombolForm();
        });
    }

    function resetTombolForm() {
        btnSubmitForm.disabled = false;
        btnSubmitForm.innerText = "Simpan & Publikasikan Kue";
    }

    // MEMONITOR SECARA REAL-TIME PERUBAHAN DATA KUE (Koneksi Otomatis)
    database.ref('katalog_menu').on('value', function(snapshot) {
        containerDaftarKue.innerHTML = "";
        
        if (!snapshot.exists()) {
            containerDaftarKue.innerHTML = `<p style="color:#888;">Belum ada varian kue terdaftar.</p>`;
            return;
        }

        snapshot.forEach((childSnapshot) => {
            const idKey = childSnapshot.key;
            const item = childSnapshot.val();
            
            const itemElement = document.createElement('div');
            itemElement.className = 'menu-item';
            itemElement.innerHTML = `
                <img src="${item.image || 'toko.jpeg'}" alt="kue">
                <div class="menu-details">
                    <h4>${item.name} [${item.kategori === 'best_seller' ? 'Best Seller ⭐' : 'Katalog'}]</h4>
                    <p>Rp ${parseInt(item.price).toLocaleString('id-ID')} - ${item.desc || 'Tanpa deskripsi'}</p>
                </div>
                <div class="actions">
                    <button class="btn-edit" onclick="isiFormEdit('${idKey}', '${item.name}', '${item.price}', '${item.kategori}', '${item.desc}', '${item.image}')">✍️ Edit</button>
                    <button class="btn-delete" onclick="hapusKueLive('${idKey}')">🗑️ Hapus</button>
                </div>
            `;
            containerDaftarKue.appendChild(itemElement);
        });
    });

    function isiFormEdit(id, name, price, kategori, desc, image) {
        document.getElementById('menuId').value = id;
        document.getElementById('menuName').value = name;
        document.getElementById('menuPrice').value = price;
        document.getElementById('menuKategori').value = kategori;
        document.getElementById('menuDesc').value = desc;
        document.getElementById('oldImageUrl').value = image;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
        btnSubmitForm.innerText = "Simpan Perubahan Kue (Live)";
    }

    function hapusKueLive(id) {
        if (confirm("Apakah Anda yakin ingin menghapus kue ini dari seluruh perangkat secara permanen?")) {
            database.ref('katalog_menu/' + id).remove();
        }
    }
</script>
</body>
</html>
