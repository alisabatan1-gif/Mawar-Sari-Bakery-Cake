<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Mawar Sari Bakery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase App & Database SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Navbar Admin -->
    <nav class="bg-red-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center max-w-6xl">
            <h1 class="text-xl font-bold tracking-wide">Mawar Sari Bakery - Panel Admin</h1>
            <a href="index.html" class="bg-white text-red-600 px-4 py-2 rounded font-semibold hover:bg-gray-100 transition">Lihat Toko</a>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Form Tambah/Edit Produk -->
        <div class="bg-white p-6 rounded-lg shadow-md h-fit">
            <h2 id="formTitle" class="text-xl font-semibold mb-4 text-gray-800 border-b pb-2">Tambah Menu Kue Baru</h2>
            <form id="productForm" class="space-y-4">
                <!-- Hidden Input untuk menyimpan ID kue saat mode EDIT -->
                <input type="hidden" id="editKueId">
                <input type="hidden" id="oldFotoUrl">

                <div>
                    <label class="block text-sm font-medium text-gray-700">Nama Kue</label>
                    <input type="text" id="namaKue" required class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-red-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Harga (Rp)</label>
                    <input type="number" id="hargaKue" required class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-red-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Deskripsi Rasa / Ukuran</label>
                    <textarea id="deskripsiKue" rows="3" required class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-red-500 outline-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Foto Produk <span id="fotoRequiredLabel" class="text-xs text-gray-500">(Wajib)</span></label>
                    <input type="file" id="fotoKue" accept="image/*" required class="w-full mt-1 text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100">
                    <p id="editFotoNote" class="text-xs text-amber-600 mt-1 hidden">💡 Kosongkan jika tidak ingin mengganti foto yang sudah ada.</p>
                </div>
                
                <!-- Pilihan Centang Best Seller -->
                <div class="pt-2">
                    <label class="inline-flex items-center gap-2 cursor-pointer bg-amber-50 border border-amber-200 p-3 rounded-lg w-full">
                        <input type="checkbox" id="bestSellerCheck" class="w-5 h-5 rounded text-amber-500 focus:ring-amber-400 border-gray-300 cursor-pointer accent-amber-500">
                        <span class="text-sm font-semibold text-amber-800 select-none">Tampilkan di Slider Best Seller (Depan)</span>
                    </label>
                </div>

                <div class="flex flex-col gap-2">
                    <button type="submit" id="btnSubmit" class="w-full bg-red-600 text-white p-3 rounded font-semibold hover:bg-red-700 transition shadow">
                        Simpan & Upload Produk
                    </button>
                    <!-- Tombol Batal Edit (Hanya muncul saat mode edit aktif) -->
                    <button type="button" id="btnBatalEdit" class="w-full bg-gray-300 text-gray-700 p-2 rounded font-semibold hover:bg-gray-400 transition hidden">
                        Batal Edit
                    </button>
                </div>
            </form>
        </div>

        <!-- Daftar Produk Terpajang -->
        <div class="bg-white p-6 rounded-lg shadow-md md:col-span-2">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 border-b pb-2">Daftar Menu Saat Ini (Live)</h2>
            <div id="loadingStatus" class="text-amber-600 font-medium italic hidden mb-4">⌛ Sedang memproses... Mohon tunggu...</div>
            <div id="daftarProduk" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
                <!-- Data menu dari Firebase akan muncul di sini secara otomatis -->
            </div>
        </div>
    </div>

    <!-- KONFIGURASI DAN SKRIP UTAMA -->
    <script>
        // ======= 1. KONFIGURASI ASLI FIREBASE ANDA =======
        const firebaseConfig = {
            apiKey: "AIzaSyBV6z7KT4OM8QiopYoFbRUGI6248HEkE8w",
            authDomain: "mawar-sari-bakery.firebaseapp.com",
            databaseURL: "https://mawar-sari-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mawar-sari-bakery",
            storageBucket: "mawar-sari-bakery.firebasestorage.app",
            messagingSenderId: "100804150468",
            appId: "1:100804150468:web:fdb97e55881183f69d7591"
        };
        
        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ======= 2. KONFIGURASI CLOUDINARY ANDA =======
        const CLOUD_NAME = "vzihwjg0";
        const UPLOAD_PRESET = "mawarsari_preset";

        // DOM Elements
        const productForm = document.getElementById('productForm');
        const loadingStatus = document.getElementById('loadingStatus');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnBatalEdit = document.getElementById('btnBatalEdit');
        const daftarProduk = document.getElementById('daftarProduk');
        const formTitle = document.getElementById('formTitle');
        
        // Form inputs
        const editKueId = document.getElementById('editKueId');
        const oldFotoUrl = document.getElementById('oldFotoUrl');
        const namaKueInput = document.getElementById('namaKue');
        const hargaKueInput = document.getElementById('hargaKue');
        const deskripsiKueInput = document.getElementById('deskripsiKue');
        const fotoKueInput = document.getElementById('fotoKue');
        const bestSellerCheck = document.getElementById('bestSellerCheck');
        const fotoRequiredLabel = document.getElementById('fotoRequiredLabel');
        const editFotoNote = document.getElementById('editFotoNote');

        // Global state untuk melacak daftar kue di memori lokal admin
        let localKatalog = {};

        // ======= 3. FUNGSI UPLOAD DENGAN DETEKSI ERROR GAMBLANG =======
        async function uploadKeCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            console.log("Cloudinary Server Response:", result);

            if (!response.ok) {
                throw new Error(result.error ? result.error.message : 'Gagal mengunggah gambar.');
            }

            return result.secure_url;
        }

        // ======= 4. PROSES SIMPAN / UPDATE DATABASE =======
        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const isEditMode = editKueId.value !== "";
            const nama = namaKueInput.value;
            const harga = hargaKueInput.value;
            const deskripsi = deskripsiKueInput.value;
            const fotoFile = fotoKueInput.files[0];
            const isBestSeller = bestSellerCheck.checked;

            // Animasi loading
            btnSubmit.disabled = true;
            loadingStatus.classList.remove('hidden');
            btnSubmit.innerText = isEditMode ? "Sedang Memperbarui Data..." : "Sedang Mengupload Gambar...";

            try {
                let urlGambarFinal = oldFotoUrl.value;

                // Jika ada file foto baru yang diunggah
                if (fotoFile) {
                    urlGambarFinal = await uploadKeCloudinary(fotoFile);
                }

                if (isEditMode) {
                    // MODE EDIT: Update data di Firebase pada path ID spesifik
                    const targetId = editKueId.value;
                    await database.ref('katalog_menu/' + targetId).update({
                        nama: nama,
                        harga: parseInt(harga),
                        deskripsi: deskripsi,
                        image: urlGambarFinal,
                        best_seller: isBestSeller
                    });
                    alert('Data kue berhasil diperbarui!');
                } else {
                    // MODE TAMBAH BARU: Push data baru ke Firebase
                    const menuBaruRef = database.ref('katalog_menu').push();
                    await menuBaruRef.set({
                        id: menuBaruRef.key,
                        nama: nama,
                        harga: parseInt(harga),
                        deskripsi: deskripsi,
                        image: urlGambarFinal,
                        best_seller: isBestSeller
                    });
                    alert('Alhamdulillah, produk kue baru berhasil ditambahkan!');
                }

                resetFormKeSemula();

            } catch (error) {
                console.error("Detail Error:", error);
                alert('Oops! Proses gagal karena: ' + error.message);
            } finally {
                btnSubmit.disabled = false;
                loadingStatus.classList.add('hidden');
                updateSubmitButtonText();
            }
        });

        // ======= 5. LIVE READ DARI PATH 'katalog_menu' =======
        database.ref('katalog_menu').on('value', (snapshot) => {
            daftarProduk.innerHTML = "";
            const data = snapshot.val();
            localKatalog = data || {};
            
            if (!data) {
                daftarProduk.innerHTML = `<p class="text-gray-500 italic col-span-2">Belum ada menu kue yang terdaftar.</p>`;
                return;
            }

            Object.keys(data).forEach((key) => {
                const item = data[key];
                
                // Cek status Best Seller untuk label
                const statusBestSeller = (item.best_seller === true || item.isBestSeller === true) 
                    ? `<span class="absolute top-2 right-2 bg-amber-500 text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm">🔥 Best Seller</span>` 
                    : '';

                const card = document.createElement('div');
                card.className = "bg-gray-50 p-4 rounded-lg border border-gray-200 flex flex-col justify-between shadow-sm relative";
                card.innerHTML = `
                    <div>
                        <div class="relative">
                            <img src="${item.image}" alt="${item.nama}" class="w-full h-32 object-cover rounded mb-2 bg-gray-200">
                            ${statusBestSeller}
                        </div>
                        <h3 class="font-bold text-gray-800 text-lg">${item.nama}</h3>
                        <p class="text-red-600 font-semibold text-sm">Rp ${item.harga.toLocaleString('id-ID')}</p>
                        <p class="text-gray-600 text-xs mt-1 line-clamp-2">${item.deskripsi}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-3">
                        <button onclick="aktifkanModeEdit('${item.id}')" class="bg-blue-50 hover:bg-blue-100 text-blue-600 font-medium py-1.5 px-3 text-xs rounded transition text-center">
                            ✏️ Edit Kue
                        </button>
                        <button onclick="hapusProduk('${item.id}')" class="bg-gray-100 hover:bg-red-50 text-red-600 font-medium py-1.5 px-3 text-xs rounded transition text-center">
                            🗑️ Hapus
                        </button>
                    </div>
                `;
                daftarProduk.appendChild(card);
            });
        });

        // ======= 6. FUNGSI AKTIFKAN MODE EDIT =======
        window.aktifkanModeEdit = function(id) {
            const kue = localKatalog[id];
            if (!kue) return;

            // Isi form dengan data lama
            editKueId.value = id;
            oldFotoUrl.value = kue.image;
            namaKueInput.value = kue.nama;
            hargaKueInput.value = kue.harga;
            deskripsiKueInput.value = kue.deskripsi;
            bestSellerCheck.checked = (kue.best_seller === true || kue.isBestSeller === true);

            // Sesuaikan validasi input foto (saat edit, foto tidak wajib diisi ulang)
            fotoKueInput.required = false;
            fotoRequiredLabel.classList.add('hidden');
            editFotoNote.classList.remove('hidden');

            // Ubah tampilan visual Form
            formTitle.innerText = "Edit Menu Kue";
            formTitle.classList.add("text-blue-700");
            btnBatalEdit.classList.remove('hidden');
            updateSubmitButtonText();

            // Scroll otomatis layar ke bagian form agar nyaman di HP/PC
            productForm.scrollIntoView({ behavior: 'smooth' });
        }

        // ======= 7. BATAL EDIT & RESET FORM =======
        function resetFormKeSemula() {
            productForm.reset();
            editKueId.value = "";
            oldFotoUrl.value = "";
            
            // Kembalikan validasi foto menjadi wajib
            fotoKueInput.required = true;
            fotoRequiredLabel.classList.remove('hidden');
            editFotoNote.classList.add('hidden');

            // Kembalikan tampilan visual Form ke Tambah Baru
            formTitle.innerText = "Tambah Menu Kue Baru";
            formTitle.classList.remove("text-blue-700");
            btnBatalEdit.classList.add('hidden');
            updateSubmitButtonText();
        }

        btnBatalEdit.addEventListener('click', resetFormKeSemula);

        function updateSubmitButtonText() {
            const isEditMode = editKueId.value !== "";
            btnSubmit.innerText = isEditMode ? "Perbarui & Update Produk" : "Simpan & Upload Produk";
        }

        // ======= 8. FUNGSI HAPUS PRODUK =======
        window.hapusProduk = function(id) {
            if(confirm("Apakah Anda yakin ingin menghapus menu kue ini dari katalog toko?")) {
                database.ref('katalog_menu/' + id).remove()
                .then(() => {
                    alert("Menu kue berhasil dihapus.");
                    if(editKueId.value === id) {
                        resetFormKeSemula();
                    }
                })
                .catch((err) => alert("Gagal menghapus: " + err.message));
            }
        }
    </script>
</body>
</html>
