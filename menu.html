<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Menu - Mawar Sari Bakery & Cake</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tambahan style khusus halaman menu agar rapi */
        .btn-back-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 90px 20px 10px 20px; /* Ditambah padding atas agar tidak tertutup navbar fixed */
        }
        .btn-back {
            display: inline-block;
            color: #d35400;
            text-decoration: none;
            font-weight: bold;
        }
        .empty-message {
            text-align: center;
            padding: 50px;
            color: #888;
            font-style: italic;
        }

        /* ===================================================== */
        /* === NEW: HERO BANNER & SEARCH BAR (STYLE ALA KA.YA) == */
        /* ===================================================== */
        .kaya-products-wrapper {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            width: 100%;
            max-width: 800px; /* Disamakan dengan max-width list menu kamu */
            margin: 10px auto 0 auto;
            padding: 90px 20px 0 20px;
            box-sizing: border-box;
        }

        .kaya-hero-banner {
            position: relative;
            width: 100%;
            height: 260px; 
            /* GANTI 'bg-roti.jpg' dengan file gambar background pilihanmu */
            background-image: url(bg\ roti.jpeg); 
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 14px; /* Sudut melengkung halus mengikuti gaya ShopeeFood */
            overflow: hidden;
        }

        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: transparent; 
            z-index: 1;
        }

        .banner-content {
            position: relative;
            z-index: 2;
            padding: 0 20px;
        }

        .banner-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0 0 12px 0;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.9), 0 4px 8px rgba(0, 0, 0, 0.9);
        }

        .banner-subtitle {
            font-size: 1rem;
            color: #f8f9fa;
            margin: 0 auto;
            max-width: 580px;
            line-height: 1.5;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9), 0 1px 4px rgba(0, 0, 0, 0.9);
        }

        /* SEARCH BAR OVAL MELAYANG */
        .search-container {
            width: 100%;
            max-width: 480px;
            margin: -24px auto 30px auto; 
            position: relative;
            z-index: 3;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 30px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.07);
            padding: 4px 18px;
        }

        .search-icon {
            width: 16px;
            height: 16px;
            color: #888;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .search-input {
            width: 100%;
            border: none;
            outline: none;
            padding: 8px 3px;
            font-size: 0.9rem;
            background: transparent;
            color: #333;
        }

        /* ===================================================== */
        /* ===== LIST HORIZONTAL ALA SHOPEEFOOD ================= */
        /* ===================================================== */

        .menu-list-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 0 20px 60px 20px;
        }

        .menu-list-item {
            display: flex;
            align-items: stretch;
            background: #1e1e1e;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            overflow: hidden;
            transition: all 0.25s ease;
            position: relative;
        }

        .menu-list-item:hover {
            box-shadow: 0 8px 22px rgba(211,84,0,0.12);
            transform: translateY(-2px);
        }

        .menu-list-img-wrap {
            flex-shrink: 0;
            width: 110px;
            height: 110px;
            position: relative;
        }

        .menu-list-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .menu-list-badge {
            position: absolute;
            top: 6px;
            left: 6px;
            background: #e74c3c;
            color: #fff;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 3px 7px;
            border-radius: 6px;
            letter-spacing: 0.2px;
        }

        .menu-list-info {
            flex: 1;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .menu-list-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.02rem;
            color: #ffffff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .menu-list-desc {
            font-size: 0.82rem;
            color: #b3b3b3;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .menu-list-price-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .menu-list-price {
            font-size: 1.05rem;
            font-weight: 700;
            color: #d35400;
        }

        .menu-list-price.promo {
            color: #e74c3c;
        }

        .menu-list-price-original {
            font-size: 0.8rem;
            color: #aaa;
            text-decoration: line-through;
        }

        .menu-list-actions {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 14px 10px 6px;
            border-left: 1px solid #f2f2f2;
        }

        .menu-list-icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff5f0;
            border: 1px solid #f0ddd0;
            color: #e67e22;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .menu-list-icon-btn:hover {
            background: #ffe8db;
        }

        .menu-list-buy-btn {
            background: #d35400;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
        }
        .menu-list-buy-btn:hover {
            background: #e67e22;
            transform: translateY(-1px);
        }

        /* Tampilan mobile: optimasi layout */
        @media (max-width: 600px) {
            .btn-back-container { padding-top: 80px; }
            .kaya-hero-banner { height: 200px; }
            .banner-title { font-size: 1.6rem; }
            .banner-subtitle { font-size: 0.8rem; }
            .menu-list-img-wrap { width: 90px; height: 90px; }
            .menu-list-icon-btn { display: none; }
            .menu-list-name { font-size: 0.92rem; }
            .menu-list-desc { display: none; }
            .menu-list-buy-btn { padding: 9px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- NAVIGATION BAR -->
    <div class="navbar">
    <div class="logo">Mawar Sari Bakery & Cake</div>

    <div class="menu-toggle" id="menu-toggle">
        ☰
    </div>

    <ul class="nav-links" id="nav-links">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#tentang">Tentang Kami</a></li>
        <li><a href="menu.html" class="active">Produk</a></li>
        <li><a href="index.html#kontak">Hubungi Kami</a></li>
    </ul>
</div>

    <!-- HERO BANNER & SEARCH BAR NEW VERSION -->
    <div class="kaya-products-wrapper">
        <div class="kaya-hero-banner">
            <div class="banner-overlay"></div>
            <div class="banner-content">
                <h1 class="banner-title">Semua Daftar Menu Lezat</h1>
                <p class="banner-subtitle">Jelajahi berbagai pilihan roti segar, kue premium, dan camilan berkualitas tinggi buatan kami.</p>
            </div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <!-- Menambahkan id="searchInput" dan fungsi onkeyup untuk memfilter pencarian -->
                <input type="text" id="searchInput" onkeyup="filterMenu()" placeholder="Search products..." class="search-input">
            </div>
        </div>
    </div>

    <!-- SECTION SEMUA PRODUK -->
     <section class="product-section" style="background-color: #222222 !important; padding:  30px 0;">
        <div class="menu-list-container" id="allMenuGrid">
            <!-- Data otomatis dari admin -->
        </div>
    </section>

    <!-- FOOTER -->
    <div class="footer-section">
        <p class="copyright">© 2026 Mawar Sari Bakery & Cake. All Rights Reserved.</p>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        function loadAllMenu() {
            const menuGrid = document.getElementById('allMenuGrid');
            if (!menuGrid) return;

            let customMenu = JSON.parse(localStorage.getItem('umkm_menu')) || [];

            if (customMenu.length === 0) {
                menuGrid.innerHTML = `
                    <div class="empty-message">
                        <p>Belum ada menu yang ditambahkan oleh Admin.</p>
                    </div>
                `;
                return;
            }

            menuGrid.innerHTML = '';

            customMenu.forEach(item => {
                const listItem = document.createElement('div');
                listItem.className = 'menu-list-item';

                let badgePromo = '';
                let hargaTampilan = `<span class="menu-list-price">Rp ${parseInt(item.price).toLocaleString('id-ID')}</span>`;

                if (item.isPromo && item.promoPrice) {
                    badgePromo = `<span class="menu-list-badge">PROMO</span>`;
                    hargaTampilan = `
                        <span class="menu-list-price promo">Rp ${parseInt(item.promoPrice).toLocaleString('id-ID')}</span>
                        <span class="menu-list-price-original">Rp ${parseInt(item.price).toLocaleString('id-ID')}</span>
                    `;
                }

                listItem.innerHTML = `
                    <div class="menu-list-img-wrap">
                        ${badgePromo}
                        <img src="${item.image || 'default-kue.jpg'}" alt="${item.name}">
                    </div>
                    <div class="menu-list-info">
                        <div class="menu-list-name">${item.name}</div>
                        <div class="menu-list-desc">${item.desc || 'Tidak ada deskripsi.'}</div>
                        <div class="menu-list-price-row">
                            ${hargaTampilan}
                        </div>
                    </div>
                    <div class="menu-list-actions">
                        <button class="menu-list-icon-btn" onclick="window.open('https://wa.me/6281292330422?text=Halo%20Admin%20Mawar%20Sari,%20saya%20ingin%20tanya%20tentang%20kue%20${encodeURIComponent(item.name)}', '_blank')" title="Chat Admin">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 2.02.6 3.9 1.63 5.48L2.05 22l4.7-.93C8.16 21.65 9.99 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
                        </button>
                        <button class="menu-list-buy-btn" onclick="prosesBeli('${item.name}', this)">Beli Sekarang ›</button>
                    </div>
                `;

                menuGrid.appendChild(listItem);
            });
        }

        // FUNGSI BARU: Untuk mengaktifkan kolom pencarian agar bisa menyaring produk secara realtime
        function filterMenu() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const menuItems = document.getElementsByClassName('menu-list-item');

            for (let i = 0; i < menuItems.length; i++) {
                let nameElement = menuItems[i].querySelector('.menu-list-name');
                if (nameElement) {
                    let textValue = nameElement.textContent || nameElement.innerText;
                    if (textValue.toLowerCase().indexOf(filter) > -1) {
                        menuItems[i].style.display = ""; // Tampilkan jika cocok
                    } else {
                        menuItems[i].style.display = "none"; // Sembunyikan jika tidak cocok
                    }
                }
            }
        }

        function prosesBeli(namaKue, btn) {
            let listItem = btn.closest('.menu-list-item');
            let imgSrc = listItem.querySelector('.menu-list-img-wrap img').src;

            let customMenu = JSON.parse(localStorage.getItem('umkm_menu')) || [];
            const produkDipilih = customMenu.find(item => item.name === namaKue);

            let hargaAplikasi = produkDipilih ? produkDipilih.price : 0;
            if (produkDipilih && produkDipilih.isPromo && produkDipilih.promoPrice) {
                hargaAplikasi = produkDipilih.promoPrice;
            }

            const dataCheckout = {
                name: namaKue,
                price: hargaAplikasi,
                image: imgSrc || 'default-kue.jpg'
            };

            localStorage.setItem('produk_checkout', JSON.stringify(dataCheckout));
            window.location.href = 'checkout.html';
        }

        window.onload = loadAllMenu;
    </script>

     <script>
const menuToggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

menuToggle.addEventListener("click", function(){
    navLinks.classList.toggle("active");
});

</script>

</body>
</html>
