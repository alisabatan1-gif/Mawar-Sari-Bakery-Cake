<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Kue & Roti Segar - Mawar Sari Bakery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#FFFDF9] font-sans antialiased text-gray-800">

    <!-- Header Area -->
    <header class="max-w-md mx-auto px-4 pt-6 pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-extrabold text-[#B93C28] leading-tight">Katalog Kue</h1>
            <h1 class="text-3xl font-extrabold text-[#B93C28] leading-tight">& Roti Segar</h1>
        </div>
        <a href="index.html" class="bg-[#E48227] text-white px-4 py-3 rounded-2xl font-bold text-sm shadow-sm hover:bg-[#d2731e] transition flex flex-col items-center text-center leading-tight max-w-[110px]">
            <span>🏠 Ke</span>
            <span>Halaman</span>
            <span>Utama</span>
        </a>
    </header>

    <div class="max-w-md mx-auto my-2 border-b-2 border-[#B93C28] mx-4"></div>

    <!-- Main Content Grid -->
    <main class="max-w-md mx-auto px-4 py-4">
        <!-- Container untuk kartu produk -->
        <div id="menu-container" class="space-y-6">
            <p class="text-gray-500 italic text-center py-10">Memuat katalog menu segar... Mohon tunggu...</p>
        </div>
    </main>

    <!-- FIREBASE AND RENDERING SCRIPT -->
    <script>
        // ======= 1. KONFIGURASI FIREBASE RESMI =======
        const firebaseConfig = {
            apiKey: "AIzaSyBV6z7KT4OM8QiopYoFbRUGI6248HEkE8w",
            authDomain: "mawar-sari-bakery.firebaseapp.com",
            databaseURL: "https://mawar-sari-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mawar-sari-bakery",
            storageBucket: "mawar-sari-bakery.firebasestorage.app",
            messagingSenderId: "100804150468",
            appId: "1:100804150468:web:fdb97e55881183f69d7591"
        };
        
        // Inisialisasi
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const menuContainer = document.getElementById('menu-container');

        // ======= 2. FUNGSI RUPIAH AMAN UNTUK HP (ANTI NaN) =======
        function formatRupiahHP(angka) {
            if (angka === undefined || angka === null || isNaN(angka)) {
                return "0";
            }
            return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // ======= 3. AMBIL DATA DARI PATH 'katalog_menu' =======
        database.ref('katalog_menu').on('value', (snapshot) => {
            menuContainer.innerHTML = "";
            const data = snapshot.val();
            
            if (!data) {
                menuContainer.innerHTML = `<p class="text-gray-500 italic text-center py-10">Belum ada varian menu yang ditambahkan oleh toko.</p>`;
                return;
            }

            Object.keys(data).forEach((key) => {
                const item = data[key];
                
                // Pastikan variabel aman dan tidak undefined/kosong
                const namaAman = item.nama ? item.nama : "Kue Lezat";
                const hargaAman = item.harga ? item.harga : 0;
                const deskripsiAman = item.deskripsi ? item.deskripsi : "Deskripsi varian belum ditambahkan oleh toko.";
                const gambarAman = item.image ? item.image : "https://res.cloudinary.com/demo/image/upload/v1/sample.jpg";

                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-gray-100 p-4 flex flex-col gap-3";
                
                card.innerHTML = `
                    <!-- Foto Menu Produk -->
                    <div class="w-full h-56 rounded-2xl overflow-hidden bg-gray-50">
                        <img src="${gambarAman}" alt="${namaAman}" class="w-full h-full object-cover">
                    </div>

                    <!-- Detail Menu -->
                    <div class="px-1 space-y-1">
                        <span class="inline-block bg-[#3498DB] text-white text-[11px] font-semibold px-3 py-1 rounded-full tracking-wide">
                            Pilihan Premium
                        </span>
                        
                        <!-- Nama Kue -->
                        <h2 class="text-xl font-bold text-gray-900 pt-1">${namaAman}</h2>
                        
                        <!-- Harga Kue -->
                        <p class="text-[#E48227] font-extrabold text-lg">Rp ${formatRupiahHP(hargaAman)}</p>
                        
                        <!-- Deskripsi -->
                        <p class="text-gray-400 text-sm font-normal pt-1 leading-relaxed">${deskripsiAman}</p>
                    </div>

                    <!-- Tombol Beli Langsung (SUDAH DIUBAH KE CHECKOUT.HTML) -->
                    <div class="pt-1">
                        <a href="checkout.html?nama=${encodeURIComponent(namaAman)}&harga=${hargaAman}&image=${encodeURIComponent(gambarAman)}" 
                           class="w-full bg-[#2ECC71] hover:bg-[#27ae60] text-white font-bold py-3 px-4 rounded-xl shadow-sm transition flex justify-center items-center gap-2 text-base">
                           <span>🛒</span> Beli Langsung
                        </a>
                    </div>
                `;
                menuContainer.appendChild(card);
            });
        });
    </script>
</body>
</html>
