<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semua Menu - Mawar Sari Bakery</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fafafa; margin: 0; padding: 0; }
        .navbar { background: #e67e22; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 20px; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; }
        .menu-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .card-menu { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 18px; margin: 0 0 10px 0; color: #2c3e50; }
        .card-desc { font-size: 14px; color: #7f8c8d; margin-bottom: 15px; line-height: 1.4; }
        .price-tag { font-size: 16px; font-weight: bold; color: #e67e22; margin-bottom: 15px; }
        .btn-buy { background: #e67e22; color: white; text-align: center; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-buy:hover { background: #d35400; }
    </style>

    <!-- LOAD SDK FIREBASE ONLINE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="navbar">
        <div class="logo">Mawar Sari Bakery & Cake</div>
        <div class="nav-links"><a href="index.html">⬅️ Kembali ke Home</a></div>
    </div>

    <div class="menu-container">
        <h2 style="text-align: center; color: #2c3e50;">Katalog Kue Terlengkap Kami</h2>
        <p style="text-align: center; color: #7f8c8d;">Live terhubung ke Cloud. Pilihlah cita rasa premium favorit Anda.</p>
        
        <div class="menu-grid" id="fullMenuGrid">
            <p style="text-align: center; grid-column: 1/-1;">Menghubungkan ke database kue...</p>
        </div>
    </div>

    <script>
        // MASUKKAN KONFIGURASI FIREBASE ANDA DI SINI (Harus sama seperti di file admin)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "mawar-sari-bakery.firebaseapp.com",
            databaseURL: "https://mawar-sari-bakery-default-rtdb.firebaseio.com",
            projectId: "mawar-sari-bakery",
            storageBucket: "mawar-sari-bakery.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Object penampung sementara data live dari Firebase
        let dataKueFirebase = {};

        // Ambil data kue secara otomatis dan realtime dari Cloud Database
        database.ref('katalog_menu').on('value', function(snapshot) {
            const menuGrid = document.getElementById('fullMenuGrid');
            menuGrid.innerHTML = '';
            
            if (!snapshot.exists()) {
                menuGrid.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: #888;">Belum ada menu kue yang tersedia saat ini.</p>';
                return;
            }

            dataKueFirebase = snapshot.val(); // simpan objek utuh untuk fungsi beli

            snapshot.forEach((childSnapshot) => {
                const key = childSnapshot.key;
                const item = childSnapshot.val();

                menuGrid.innerHTML += `
                    <div class="card-menu">
                        <img src="${item.image}" alt="${item.name}" class="card-img">
                        <div class="card-body">
                            <div>
                                <h3 class="card-title">${item.name}</h3>
                                <p class="card-desc">${item.desc || 'Kue kelezatan premium buatan Mawar Sari Bakery.'}</p>
                            </div>
                            <div>
                                <div class="price-tag">Rp ${parseInt(item.price).toLocaleString('id-ID')}</div>
                                <button class="btn-buy" onclick="beliSekarang('${key}')">Pesan Sekarang</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        function beliSekarang(key) {
            const itemSelected = dataKueFirebase[key];
            
            const dataCheckout = {
                name: itemSelected.name,
                price: itemSelected.price,
                image: itemSelected.image
            };

            // Menyimpan sementara item terpilih ke checkout page
            localStorage.setItem('produk_checkout', JSON.stringify(dataCheckout));
            window.location.href = 'checkout.html';
        }
    </script>
</body>
</html>
