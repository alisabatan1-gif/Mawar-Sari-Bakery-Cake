<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Pemesanan - Mawar Sari Bakery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800">

    <div class="max-w-md mx-auto px-4 py-8">
        <div class="bg-white rounded-3xl shadow-md border border-gray-100 p-6 space-y-6">
            
            <h1 class="text-2xl font-bold text-gray-900">Detail Pemesanan</h1>

            <!-- Preview Ringkasan Kue yang Dipilih -->
            <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-2xl border-l-4 border-[#E48227]">
                <div class="w-20 h-20 rounded-xl overflow-hidden bg-gray-200 flex-shrink-0">
                    <img id="preview-gambar" src="toko.jpeg" alt="Preview" class="w-full h-full object-cover">
                </div>
                <div>
                    <!-- Nama Kue -->
                    <h2 id="preview-nama" class="text-lg font-bold text-gray-900">Memuat nama...</h2>
                    <!-- Harga Kue -->
                    <p id="preview-harga" class="text-[#E48227] font-extrabold text-base">Rp 0</p>
                </div>
            </div>

            <!-- Form Isian Pembeli -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-1">Nama Penerima:</label>
                    <input type="text" id="nama-penerima" placeholder="Contoh: Budi Santoso" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-1">Nomor WhatsApp/HP:</label>
                    <input type="tel" id="nomor-wa" placeholder="Contoh: 08123456789" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-1">Jumlah (Pcs):</label>
                    <input type="number" id="jumlah-pcs" value="1" min="1" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-1">Metode Pengiriman:</label>
                    <select id="metode-kirim" class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-red-500 outline-none">
                        <option value="Ambil Sendiri di Toko (Gratis)">Ambil Sendiri di Toko (Gratis)</option>
                        <option value="Kirim Kurir (Ongkir Menyesuaikan)">Kirim Kurir (Ongkir Menyesuaikan)</option>
                    </select>
                </div>

                <!-- KOLOM ALAMAT & MAPS (Dinamis: Muncul jika pilih Kirim Kurir) -->
                <div id="kolom-alamat" class="hidden space-y-4 pt-2">
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-1">Alamat Lengkap:</label>
                        <textarea id="alamat-lengkap" rows="3" placeholder="Tuliskan alamat lengkap (Nama Jalan, No. Rumah, RT/RW, Patokan)" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 outline-none resize-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-1">Pin Koordinat Lokasi Anda:</label>
                        
                        <!-- TOMBOL AKSES GOOGLE MAPS LANGSUNG -->
                        <a href="https://www.google.com/maps" target="_blank" class="w-full mb-2 bg-[#3498db] hover:bg-[#2980b9] text-white font-bold py-2 px-4 rounded-xl text-xs flex justify-center items-center gap-2 transition shadow-sm">
                            📍 Klik di Sini Untuk Buka Google Maps
                        </a>
                        
                        <input type="text" id="link-maps" placeholder="Tempel / Paste link share lokasi Google Maps Anda di sini" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                        <p class="text-[11px] text-gray-500 mt-1">*Buka maps dengan tombol di atas, cari lokasi rumah Anda, lalu salin link bagikannya ke kotak ini.</p>
                    </div>
                </div>
            </div>

            <!-- Total Bayar -->
            <div class="text-right pt-2">
                <p class="text-xl font-extrabold text-[#E48227]">
                    Total Bayar: <span id="total-bayar">Rp 0</span>
                </p>
            </div>

            <!-- Tombol Kirim Pesanan Hijau -->
            <div>
                <button id="btn-kirim" class="w-full bg-[#2ECC71] hover:bg-[#27ae60] text-white font-bold py-4 px-4 rounded-2xl shadow-sm transition flex justify-center items-center gap-2 text-base">
                    💬 Kirim Pesanan via WhatsApp
                </button>
            </div>

        </div>
    </div>

    <!-- SCRIPT UTK MEMPROSES DATA URL, LOCALSTORAGE & MEMBUAT LINK WA -->
    <script>
        // ======= 0. KONFIGURASI UTAMA TOKO (MUDAH DIUBAH PEMBELI WEB) =======
        const NOMOR_WHATSAPP_TOKO = "6281292330422"; // Ganti ke nomor pembeli website Anda nanti

        // ======= 1. AMBIL PARAMETER KUE DARI URL ATAU LOCALSTORAGE =======
        const urlParams = new URLSearchParams(window.location.search);
        let namaKue = urlParams.get('nama');
        let hargaKue = parseInt(urlParams.get('harga'));
        let gambarKue = urlParams.get('image');

        // Jika di URL kosong, coba ambil dari localStorage (dari halaman utama index.html)
        if (!namaKue) {
            const dataLokal = localStorage.getItem('produk_checkout');
            if (dataLokal) {
                try {
                    const parsedData = JSON.parse(dataLokal);
                    namaKue = parsedData.name || "Kue Pilihan";
                    hargaKue = parseInt(parsedData.price) || 0;
                    gambarKue = parsedData.image || "toko.jpeg";
                } catch (e) {
                    console.error("Gagal membaca localStorage", e);
                }
            }
        }

        // Default jika semuanya kosong
        namaKue = namaKue || "Kue Pilihan";
        hargaKue = hargaKue || 0;
        gambarKue = gambarKue || "toko.jpeg";

        // Element DOM
        const previewGambar = document.getElementById('preview-gambar');
        const previewNama = document.getElementById('preview-nama');
        const previewHarga = document.getElementById('preview-harga');
        const inputJumlah = document.getElementById('jumlah-pcs');
        const txtTotalBayar = document.getElementById('total-bayar');
        const selectMetode = document.getElementById('metode-kirim');
        const btnKirim = document.getElementById('btn-kirim');
        
        // Elemen Alamat Baru
        const kolomAlamat = document.getElementById('kolom-alamat');
        const inputAlamat = document.getElementById('alamat-lengkap');
        const inputMaps = document.getElementById('link-maps');

        // Taruh data ke tampilan atas
        previewGambar.src = gambarKue;
        previewNama.innerText = namaKue;
        
        // ======= 2. FUNGSI RUPIAH ANTI-ERROR DI HP =======
        function formatRupiahHP(angka) {
            if (angka === undefined || angka === null || isNaN(angka)) {
                return "0";
            }
            return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        previewHarga.innerText = "Rp " + formatRupiahHP(hargaKue);

        // ======= 3. HITUNG TOTAL BAYAR SECARA REALTIME =======
        function hitungTotal() {
            const qty = parseInt(inputJumlah.value) || 1;
            const total = hargaKue * qty;
            txtTotalBayar.innerText = "Rp " + formatRupiahHP(total);
        }

        // Jalankan hitungan pertama kali & tiap kali jumlah diubah
        hitungTotal();
        inputJumlah.addEventListener('input', hitungTotal);
        inputJumlah.addEventListener('change', hitungTotal);

        // ======= TAMPIL/SEMBUNYIKAN KOLOM ALAMAT SECARA DINAMIS =======
        selectMetode.addEventListener('change', function() {
            if (this.value === "Kirim Kurir (Ongkir Menyesuaikan)") {
                kolomAlamat.classList.remove('hidden');
            } else {
                kolomAlamat.classList.add('hidden');
                // Kosongkan input agar tidak terbawa di pesan WA jika diganti ke Ambil Sendiri
                inputAlamat.value = "";
                inputMaps.value = "";
            }
        });

        // ======= 4. PROSES KIRIM DATA KE WHATSAPP TOKO =======
        btnKirim.addEventListener('click', () => {
            const penerima = document.getElementById('nama-penerima').value.trim();
            const waPembeli = document.getElementById('nomor-wa').value.trim();
            const qty = inputJumlah.value;
            const metode = selectMetode.value;
            const totalBayar = hargaKue * qty;
            
            const alamatText = inputAlamat.value.trim();
            const mapsText = inputMaps.value.trim();

            // Validasi inputan agar wajib diisi dahulu
            if (!penerima) {
                alert("Harap isi Nama Penerima terlebih dahulu!");
                return;
            }
            if (!waPembeli) {
                alert("Harap isi Nomor WhatsApp Anda!");
                return;
            }

            // Validasi Alamat jika opsi Pengantaran Kurir dipilih
            if (metode === "Kirim Kurir (Ongkir Menyesuaikan)" && !alamatText) {
                alert("Harap isi Alamat Lengkap pengiriman Anda!");
                return;
            }
            if (metode === "Kirim Kurir (Ongkir Menyesuaikan)" && !mapsText) {
                alert("Harap isi atau tempel link lokasi Google Maps Anda!");
                return;
            }

            // Konstruksi teks bagian alamat jika memilih Kurir
            let rincianAlamat = "";
            if (metode === "Kirim Kurir (Ongkir Menyesuaikan)") {
                rincianAlamat = `\n* Alamat Lengkap: ${alamatText}`;
                if (mapsText) {
                    rincianAlamat += `\n* Google Maps: ${mapsText}`;
                }
            }

            // Menyusun format pesan WhatsApp yang rapi
            const teksPesan = `Halo Mawar Sari Bakery, saya ingin melakukan pemesanan kue:

*DETAIL PESANAN*
* Nama Kue: ${namaKue}
* Harga Satuan: Rp ${formatRupiahHP(hargaKue)}
* Jumlah (Pcs): ${qty} buah
* Total Bayar: Rp ${formatRupiahHP(totalBayar)}

*DATA PENERIMA*
* Nama: ${penerima}
* No. HP: ${waPembeli}
* Metode Pengiriman: ${metode}${rincianAlamat}

Mohon segera diproses ya, terima kasih!`;

            // Buka WhatsApp pembeli
            const linkWhatsApp = `https://wa.me/${NOMOR_WHATSAPP_TOKO}?text=${encodeURIComponent(teksPesan)}`;
            window.open(linkWhatsApp, '_blank');
        });
    </script>
</body>
</html>
