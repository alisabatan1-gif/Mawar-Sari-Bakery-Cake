<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Pemesanan - Mawar Sari</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; }
        .checkout-container { max-width: 500px; margin: 20px auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-summary { display: flex; align-items: center; gap: 15px; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #e67e22; }
        .product-summary img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .maps-hint { background-color: #e8f4fd; border: 1px solid #b3d7ff; padding: 10px; border-radius: 5px; font-size: 13px; color: #1d6fa5; margin-bottom: 10px; }
        .btn-open-maps { background-color: #4285F4; color: white; border: none; padding: 8px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; display: inline-block; text-decoration: none; }
        .btn-open-maps:hover { background-color: #357ae8; }
        .total-pay { font-size: 1.2rem; font-weight: bold; color: #e67e22; margin: 20px 0; text-align: right; }
        .btn-order { background-color: #25d366; color: white; border: none; padding: 12px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-order:hover { background-color: #128c7e; }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2>Detail Pemesanan</h2>
    
    <!-- Informasi Produk Yang Dibeli -->
    <div class="product-summary" id="productSummary">
        <!-- Diisi otomatis oleh JS -->
    </div>

    <!-- Form Alamat Pengiriman -->
    <form id="checkoutForm">
        <div class="form-group">
            <label for="buyerName">Nama Penerima:</label>
            <input type="text" id="buyerName" required placeholder="Contoh: Budi Santoso">
        </div>
        <div class="form-group">
            <label for="buyerPhone">Nomor WhatsApp/HP:</label>
            <input type="tel" id="buyerPhone" required placeholder="Contoh: 08123456789">
        </div>
        <div class="form-group">
            <label for="buyerQty">Jumlah (Pcs):</label>
            <input type="number" id="buyerQty" value="1" min="1" required oninput="calculateTotal()">
        </div>
        <div class="form-group">
            <label for="deliveryMethod">Metode Pengiriman:</label>
            <select id="deliveryMethod" onchange="toggleDeliveryFields()">
                <option value="Ambil Sendiri">Ambil Sendiri di Toko (Gratis)</option>
                <option value="Kurir Toko">Kurir Mawar Sari (+Rp 10.000)</option>
            </select>
        </div>

        <!-- SEKSI BAGIAN GOOGLE MAPS & ALAMAT (Akan muncul jika pilih Kurir Toko) -->
        <div id="deliveryAddressSection" style="display: none; background: #fafafa; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px;">
            <div class="form-group">
                <label for="buyerAddress">Alamat Lengkap Rumah:</label>
                <textarea id="buyerAddress" rows="2" placeholder="Nama jalan, nomor rumah, RT/RW, warna pagar..."></textarea>
            </div>
            <div class="form-group">
                <label for="buyerMaps">Link Lokasi Google Maps:</label>
                <div class="maps-hint">
                    📍 <strong>Tips:</strong> Buka Google Maps, cari rumah Anda, klik <strong>Bagikan / Share</strong>, lalu pilih <strong>Salin Link / Copy Link</strong> dan tempelkan di bawah ini.
                    <br>
                    <a href="https://www.google.com/maps" target="_blank" class="btn-open-maps">🗺️ Buka Google Maps</a>
                </div>
                <input type="text" id="buyerMaps" placeholder="Tempel link Google Maps di sini (https://maps.app.goo.gl/...)">
            </div>
        </div>

        <div class="total-pay" id="totalPayment">Total Bayar: Rp 0</div>

        <button type="submit" class="btn-order">
            💬 Kirim Pesanan via WhatsApp
        </button>
    </form>
    
    <a href="index.html" class="btn-back">⬅️ Kembali ke Toko</a>
</div>

<script>
    const product = JSON.parse(localStorage.getItem('produk_checkout'));

    if (!product) {
        alert("Keranjang belanja kosong! Silakan pilih produk terlebih dahulu.");
        window.location.href = "index.html";
    }

    // Render Ringkasan Produk
    const productSummary = document.getElementById('productSummary');
    productSummary.innerHTML = `
        <img src="${product.image}" alt="${product.name}">
        <div>
            <h3 style="margin: 0; font-size: 16px;">${product.name}</h3>
            <p style="margin: 5px 0 0; color: #e67e22; font-weight: bold;">Rp ${parseInt(product.price).toLocaleString('id-ID')}</p>
        </div>
    `;

    function toggleDeliveryFields() {
        const delivery = document.getElementById('deliveryMethod').value;
        const addressSection = document.getElementById('deliveryAddressSection');
        const addressInput = document.getElementById('buyerAddress');
        
        if (delivery === "Kurir Toko") {
            addressSection.style.display = "block";
            addressInput.setAttribute('required', 'required');
        } else {
            addressSection.style.display = "none";
            addressInput.removeAttribute('required');
        }
        calculateTotal();
    }

    function calculateTotal() {
        const qty = parseInt(document.getElementById('buyerQty').value) || 1;
        const delivery = document.getElementById('deliveryMethod').value;
        const shippingCost = (delivery === "Kurir Toko") ? 10000 : 0;
        
        const total = (product.price * qty) + shippingCost;
        document.getElementById('totalPayment').innerText = `Total Bayar: Rp ${total.toLocaleString('id-ID')}`;
        return total;
    }

    // Inisialisasi total pertama kali
    calculateTotal();

    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('buyerName').value;
        const phone = document.getElementById('buyerPhone').value;
        const qty = document.getElementById('buyerQty').value;
        const delivery = document.getElementById('deliveryMethod').value;
        const address = document.getElementById('buyerAddress').value || 'Ambil di toko';
        const mapsUrl = document.getElementById('buyerMaps').value || 'Tidak melampirkan link peta';
        const totalBayar = calculateTotal();

        // Format pesan WhatsApp agar rapi beserta informasi Maps
        const waText = `*PESANAN BARU - MAWAR SARI BAKERY*\n\n` +
                       `*Produk:* ${product.name}\n` +
                       `*Harga Satuan:* Rp ${parseInt(product.price).toLocaleString('id-ID')}\n` +
                       `*Jumlah:* ${qty} Pcs\n` +
                       `----------------------------------\n` +
                       `*Nama Pembeli:* ${name}\n` +
                       `*No. HP:* ${phone}\n` +
                       `*Metode:* ${delivery}\n` +
                       `*Alamat:* ${address}\n` +
                       `*Link Maps:* ${mapsUrl}\n` +
                       `----------------------------------\n` +
                       `*TOTAL BAYAR:* *Rp ${totalBayar.toLocaleString('id-ID')}*`;

        const waUrl = `https://wa.me/6281292330422?text=${encodeURIComponent(waText)}`;
        window.open(waUrl, '_blank');
    });
</script>
</body>
</html>
