<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Mawar Sari</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fdf6f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 380px; box-sizing: border-box; }
        .login-box h2 { text-align: center; margin-bottom: 25px; color: #e67e22; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-login { width: 100%; padding: 12px; background: #e67e22; border: none; color: white; font-weight: bold; font-size: 16px; border-radius: 5px; cursor: pointer; }
        .btn-login:hover { background: #d35400; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login Admin</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" required placeholder="Masukkan username">
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required placeholder="Masukkan password">
        </div>
        <button type="submit" class="btn-login">Masuk</button>
    </form>
    <a href="index.html" class="back-link">⬅️ Kembali ke Toko</a>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Silakan ubah username dan password di bawah ini sesuai kebutuhan Anda
        if (user === 'adminmawarsari' && pass === 'mawarsari123') {
            sessionStorage.setItem('isAdminLoggedIn', 'true');
            alert('Login berhasil!');
            window.location.href = 'admin.html';
        } else {
            alert('Username atau password salah!');
        }
    });
</script>
</body>
</html>
