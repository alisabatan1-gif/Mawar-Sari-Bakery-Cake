<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Mawar Sari</title>
    <!-- 1. MEMANGGIL FIREBASE SDK UNTUK SISTEM KEAMANAN LOGIN -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; box-sizing: border-box; }
        .login-card h2 { text-align: center; margin-bottom: 25px; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-login { background-color: #e67e22; color: white; border: none; padding: 12px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn-login:hover { background-color: #d35400; }
        .error-message { color: #e74c3c; font-size: 14px; text-align: center; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login Admin</h2>
    <div class="error-message" id="errorMsg">Username atau password salah!</div>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="username">Email Admin:</label>
            <input type="email" id="username" required placeholder="Masukkan email admin">
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required placeholder="Masukkan password admin">
        </div>
        <button type="submit" id="btnLogin" class="btn-login">Masuk Halaman Admin</button>
    </form>
</div>

<!-- 2. LOGIKA KONEKSI LOGIN FIREBASE SECARA REALTIME -->
<script>
    // Konfigurasi Firebase Resmi Toko Mawar Sari
    const firebaseConfig = {
        apiKey: "AIzaSyBV6z7KT4OM8QiopYoFbRUGI6248HEkE8w",
        authDomain: "mawar-sari-bakery.firebaseapp.com",
        databaseURL: "https://mawar-sari-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mawar-sari-bakery",
        storageBucket: "mawar-sari-bakery.firebasestorage.app",
        messagingSenderId: "100804150468",
        appId: "1:100804150468:web:fdb97e55881183f69d7591"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const btnLogin = document.getElementById('btnLogin');

        // Reset status tombol & error message
        errorMsg.style.display = 'none';
        btnLogin.innerText = "Memproses...";
        btnLogin.disabled = true;

        // Proses verifikasi akun ke Firebase secara aman
        auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                // Simpan session sukses login untuk sinkronisasi halaman admin.html Anda
                sessionStorage.setItem('status_login', 'sukses_masuk');
                
                alert('Login berhasil! Mengalihkan ke panel kontrol...');
                window.location.href = 'admin.html';
            })
            .catch((error) => {
                // Tampilkan pesan error bawaan dan reset form password
                btnLogin.innerText = "Masuk Halaman Admin";
                btnLogin.disabled = false;
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
                console.error("Gagal login:", error.message);
            });
    });
</script>
</body>
</html>
